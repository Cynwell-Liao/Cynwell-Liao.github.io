<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="%BASE_URL%favicon.ico" />
    <link rel="apple-touch-icon" href="%BASE_URL%favicon.ico" />
    <link rel="canonical" href="__SITE_CANONICAL_URL__" />
    <meta name="google-site-verification" content="__SITE_GOOGLE_VERIFICATION__" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="__SITE_DESCRIPTION__" />
    <meta name="keywords" content="__SITE_KEYWORDS__" />
    <meta name="author" content="__SITE_NAME__" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="__SITE_NAME__" />
    <meta property="og:title" content="__SITE_NAME__" />
    <meta property="og:description" content="__SITE_DESCRIPTION__" />
    <meta property="og:url" content="__SITE_CANONICAL_URL__" />
    <meta property="og:image" content="__SITE_OG_IMAGE__" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="__SITE_NAME__ portfolio social card" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="__SITE_NAME__" />
    <meta name="twitter:description" content="__SITE_DESCRIPTION__" />
    <meta name="twitter:image" content="__SITE_OG_IMAGE__" />
    <meta name="twitter:image:alt" content="__SITE_NAME__ portfolio social card" />
    <title>__SITE_NAME__</title>
    <script>
      ;(() => {
        const storageKey = 'portfolio-theme'
        let storedTheme = null
        try {
          storedTheme = window.localStorage.getItem(storageKey)
        } catch {
          // Storage can be unavailable in privacy-restricted browsing contexts.
        }
        const prefersDark =
          window.matchMedia?.('(prefers-color-scheme: dark)').matches ?? false
        const shouldUseDark =
          storedTheme === 'dark' || (storedTheme !== 'light' && prefersDark)
        document.documentElement.classList.toggle('dark', shouldUseDark)
        document.documentElement.style.colorScheme = shouldUseDark ? 'dark' : 'light'
      })()
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
